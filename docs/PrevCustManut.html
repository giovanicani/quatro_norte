3\" height=\"10\"><\u002Frect><rect x=\"17\" y=\"13\" width=\"3\" height=\"4\"><\u002Frect><\u002Fsvg>\n          <div><div style=\"font-weight:700; font-size:15.5px;\">Estatística descritiva<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px; line-height:1.45;\">Média, mediana, desvio e distribuição dos custos por km.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M3 15h18M9 3v18M15 3v18\"><\u002Fpath><\u002Fsvg>\n          <div><div style=\"font-weight:700; font-size:15.5px;\">Matriz de correlação<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px; line-height:1.45;\">Heatmap entre variáveis e o custo (Pearson / Spearman).<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M4 20V4M4 20h16\"><\u002Fpath><path d=\"M5 16l4-5 4 3 6-8\"><\u002Fpath><\u002Fsvg>\n          <div><div style=\"font-weight:700; font-size:15.5px;\">Análise temporal<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px; line-height:1.45;\">Evolução do custo ao longo do tempo e da quilometragem.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M4 20V4M4 20h16\"><\u002Fpath><rect x=\"8\" y=\"8\" width=\"6\" height=\"6\"><\u002Frect><path d=\"M11 8V5M11 17v-3\"><\u002Fpath><\u002Fsvg>\n          <div><div style=\"font-weight:700; font-size:15.5px;\">Outliers &amp; valores ausentes<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px; line-height:1.45;\">Boxplots e tratamento de dados faltantes.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M4 20V4M4 20h16\"><\u002Fpath><circle cx=\"9\" cy=\"14\" r=\"2\"><\u002Fcircle><circle cx=\"15\" cy=\"9\" r=\"2\"><\u002Fcircle><circle cx=\"18\" cy=\"15\" r=\"1.6\"><\u002Fcircle><\u002Fsvg>\n          <div><div style=\"font-weight:700; font-size:15.5px;\">Custo por componente<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px; line-height:1.45;\">Quais sistemas concentram os maiores gastos.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M4 20V4M4 20h16\"><\u002Fpath><rect x=\"6\" y=\"13\" width=\"3\" height=\"4\"><\u002Frect><rect x=\"11\" y=\"9\" width=\"3\" height=\"8\"><\u002Frect><rect x=\"16\" y=\"6\" width=\"3\" height=\"11\"><\u002Frect><\u002Fsvg>\n          <div><div style=\"font-weight:700; font-size:15.5px;\">Segmentação comparativa<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px; line-height:1.45;\">Custo por montadora, ano e tipo de contrato.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 09 TÉCNICAS ============ -->\n  <div style=\"padding:48px 64px; display:grid; grid-template-columns:120px 1fr; gap:32px; background:#EDEAE1; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#E08A2B;\">09<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:10px;\">Técnicas<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:27px; margin:0 0 24px; letter-spacing:-.01em;\">Estatística e Machine Learning a serem considerados<\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;\">\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#1F4E6B; margin-bottom:14px;\">Estatística<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; font-size:14.5px; font-weight:500;\">\n            <span>Correlação (Pearson / Spearman)<\u002Fspan><span>Regressão linear simples<\u002Fspan><span>Regressão linear múltipla<\u002Fspan><span>Regressão polinomial<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#E08A2B; margin-bottom:14px;\">Machine Learning<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; font-size:14.5px; font-weight:500;\">\n            <span>Árvore de decisão (regressão)<\u002Fspan><span>Random Forest<\u002Fspan><span>Gradient Boosting<\u002Fspan><span>K-Nearest Neighbors (KNN)<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#6B6F78; margin-bottom:14px;\">Avaliação<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; font-size:14.5px; font-weight:500;\">\n            <span>Train / test split<\u002Fspan><span>Validação cruzada (k-fold)<\u002Fspan><span>Normalização / padronização<\u002Fspan><span>Métricas: R², RMSE, MAE<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 10 REFERÊNCIAS ============ -->\n  <div style=\"padding:48px 64px;\">\n    <div style=\"display:grid; grid-template-columns:120px 1fr; gap:32px;\">\n      <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#1F4E6B;\">10<\u002Fdiv>\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:6px;\">Referências<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:27px; margin:0 0 20px; letter-spacing:-.01em;\">Artigos do mesmo contexto e técnicas<\u002Fh2>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:16px; align-items:flex-start; border-top:1px solid #DAD6CC; padding-top:14px;\">\n            <span style=\"font-family:'Archivo'; font-weight:900; font-size:18px; color:#1F4E6B; flex:none; width:24px;\">a<\u002Fspan>\n            <div><div style=\"font-weight:600; font-size:16px; line-height:1.4;\">Machine learning models for maintenance cost estimation in delivery trucks using diesel and natural gas fuels<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px;\">Katreddi, Thiruvengadam, Thompson, Schmid &amp; Padmanaban · 2023<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:16px; align-items:flex-start; border-top:1px solid #DAD6CC; padding-top:14px;\">\n            <span style=\"font-family:'Archivo'; font-weight:900; font-size:18px; color:#1F4E6B; flex:none; width:24px;\">b<\u002Fspan>\n            <div><div style=\"font-weight:600; font-size:16px; line-height:1.4;\">Mixed Effects Random Forest Model for Maintenance Cost Estimation in Heavy-Duty Vehicles Using Diesel and Alternative Fuels<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px;\">Katreddi, Thiruvengadam, Thompson &amp; Schmid · 2023<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:16px; align-items:flex-start; border-top:1px solid #DAD6CC; padding-top:14px;\">\n            <span style=\"font-family:'Archivo'; font-weight:900; font-size:18px; color:#1F4E6B; flex:none; width:24px;\">c<\u002Fspan>\n            <div><div style=\"font-weight:600; font-size:16px; line-height:1.4;\">Maintenance cost prediction for the vehicle based on maintenance data<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px;\">Sun Zhonghui, Guo Yanying, Sun Zhonghong, Yang Shouchen &amp; Hao Baoyu · 2024<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:16px; align-items:flex-start; border-top:1px solid #DAD6CC; padding-top:14px;\">\n            <span style=\"font-family:'Archivo'; font-weight:900; font-size:18px; color:#1F4E6B; flex:none; width:24px;\">d<\u002Fspan>\n            <div><div style=\"font-weight:600; font-size:16px; line-height:1.4;\">A data-based investigation of vehicle maintenance cost components using ANN<\u002Fdiv><div style=\"font-size:13.5px; color:#5A6068; margin-top:3px;\">Adekitan, Adetokun &amp; Okokpujie · 2018<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n
