document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:19px; letter-spacing:-.01em;\">Quatro Norte <span style=\"color:#E08A2B;\">Consulting<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.18em; text-transform:uppercase; color:#8A8F98;\">MBA · Entrega de Projeto<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:16px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:.22em; text-transform:uppercase; color:#E08A2B;\">\n      <span>Projeto de Pesquisa · Ciência de Dados<\u002Fspan>\n      <span style=\"color:#8A8F98;\">Grupo&nbsp;01<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:62px; line-height:1.02; letter-spacing:-.02em; margin:30px 0 0;\">\n      Previsão de Custos de<br>Manutenção de Carretas\n    <\u002Fh1>\n    <p style=\"font-size:19px; line-height:1.5; color:#B9BDC4; max-width:760px; margin:22px 0 0; font-weight:400;\">\n      Análise de dados históricos e modelagem preditiva do <strong style=\"color:#F3F1EA; font-weight:600;\">custo de manutenção interno por quilômetro<\u002Fstrong> da <strong style=\"color:#F3F1EA; font-weight:600;\">frota própria<\u002Fstrong> de carretas · janela 2020–2025.\n    <\u002Fp>\n\n    <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-top:34px;\">\n      <div style=\"display:flex; align-items:center; gap:9px; background:#2A2D34; border:1px solid #3C4049; border-radius:40px; padding:9px 16px 9px 11px; font-size:14px; font-weight:500;\"><span style=\"width:26px; height:26px; border-radius:50%; background:#E08A2B; color:#1B1E24; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:12px;\">MW<\u002Fspan>Marlon Wenzel<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:9px; background:#2A2D34; border:1px solid #3C4049; border-radius:40px; padding:9px 16px 9px 11px; font-size:14px; font-weight:500;\"><span style=\"width:26px; height:26px; border-radius:50%; background:#E08A2B; color:#1B1E24; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:12px;\">JL<\u002Fspan>Jeison Lima<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:9px; background:#2A2D34; border:1px solid #3C4049; border-radius:40px; padding:9px 16px 9px 11px; font-size:14px; font-weight:500;\"><span style=\"width:26px; height:26px; border-radius:50%; background:#E08A2B; color:#1B1E24; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:12px;\">RQ<\u002Fspan>Rodrigo Queiroz<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:9px; background:#2A2D34; border:1px solid #3C4049; border-radius:40px; padding:9px 16px 9px 11px; font-size:14px; font-weight:500;\"><span style=\"width:26px; height:26px; border-radius:50%; background:#E08A2B; color:#1B1E24; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:12px;\">GC<\u002Fspan>Giovani Cani<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ HERO DIAGRAM ============ -->\n  <div style=\"padding:56px 64px; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:center;\">\n\n      <!-- factors -> model -> output -->\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#1F4E6B; margin-bottom:18px;\">Da causa ao custo<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;\">\n          <span style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:7px; padding:8px 12px; font-size:13.5px; font-weight:600;\">Idade<\u002Fspan>\n          <span style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:7px; padding:8px 12px; font-size:13.5px; font-weight:600;\">Montadora<\u002Fspan>\n          <span style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:7px; padding:8px 12px; font-size:13.5px; font-weight:600;\">KM rodado<\u002Fspan>\n          <span style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:7px; padding:8px 12px; font-size:13.5px; font-weight:600;\">Sistema VMRS<\u002Fspan>\n          <span style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:7px; padding:8px 12px; font-size:13.5px; font-weight:600;\">Tipo de contrato<\u002Fspan>\n          <span style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:7px; padding:8px 12px; font-size:13.5px; font-weight:600; color:#5A6068;\">+ histórico interno<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:stretch; gap:14px;\">\n          <div style=\"flex:1; background:#1F4E6B; color:#fff; border-radius:10px; padding:16px 18px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#9DC0D8;\">Modelo preditivo<\u002Fdiv>\n            <div style=\"font-family:'Archivo'; font-weight:800; font-size:21px; margin-top:4px;\">Machine Learning<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; font-family:'Archivo'; font-weight:800; font-size:26px; color:#E08A2B;\">→<\u002Fdiv>\n          <div style=\"flex:1; background:#E08A2B; color:#1B1E24; border-radius:10px; padding:16px 18px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase;\">Saída<\u002Fdiv>\n            <div style=\"font-family:'Archivo'; font-weight:800; font-size:21px; margin-top:4px;\">Custo / km<br>futuro<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- prediction chart -->\n      <div style=\"background:#FFFFFF; border:1px solid #DAD6CC; border-radius:14px; padding:22px '; font-weight:800; font-size:18px;\">Pneus, Câmaras, Protetores e Válvulas<\u002Fspan><\u002Fdiv>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.45; color:#5A6068;\">Pneus, câmaras de ar, protetores de aro e válvulas.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #B5532E; border-radius:12px; padding:16px 18px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radius:50%; background:#B5532E; color:#fff; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:13px;\">5<\u002Fspan><span style=\"font-family:'Archivo'; font-weight:800; font-size:18px;\">Chassi<\u002Fspan><\u002Fdiv>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.45; color:#5A6068;\">Longarinas, travessas, quinta-roda e eixos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #6B6F78; border-radius:12px; padding:16px 18px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radius:50%; background:#6B6F78; color:#fff; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:13px;\">6<\u002Fspan><span style=\"font-family:'Archivo'; font-weight:800; font-size:18px;\">Carroceria e Tanques<\u002Fspan><\u002Fdiv>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.45; color:#5A6068;\">Baú, assoalho, portas e reservatórios.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- maintenance cadence timeline -->\n    <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:14px; padding:24px 28px 20px; margin-top:18px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:22px;\">\n        <span style=\"font-family:'Archivo'; font-weight:800; font-size:17px;\">Calendário de manutenção ao longo de 12 meses<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:14px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98;\"><span style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:12px; height:12px; border-radius:50%; background:#8A8F98; border:2px solid #fff; box-shadow:0 0 0 1px #8A8F98;\"><\u002Fspan>programada<\u002Fspan><span style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#1B1E24;\"><\u002Fspan>corretiva<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:15px;\">\n        <!-- A-Check : a cada 3 meses -->\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <div style=\"width:170px; display:flex; align-items:center; gap:9px; font-size:14px; font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:#1F4E6B; flex:none;\"><\u002Fspan>A · Check Trailer<\u002Fdiv>\n          <div style=\"flex:1; position:relative; height:16px;\"><span style=\"position:absolute; left:0; right:0; top:50%; height:2px; background:#E2DED4; transform:translateY(-50%);\"><\u002Fspan><span style=\"position:absolute; left:0; top:50%; width:13px; height:13px; border-radius:50%; background:#1F4E6B; border:2px solid #fff; box-shadow:0 0 0 1px #1F4E6B; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:25%; top:50%; width:13px; height:13px; border-radius:50%; background:#1F4E6B; border:2px solid #fff; box-shadow:0 0 0 1px #1F4E6B; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:50%; top:50%; width:13px; height:13px; border-radius:50%; background:#1F4E6B; border:2px solid #fff; box-shadow:0 0 0 1px #1F4E6B; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:75%; top:50%; width:13px; height:13px; border-radius:50%; background:#1F4E6B; border:2px solid #fff; box-shadow:0 0 0 1px #1F4E6B; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:100%; top:50%; width:13px; height:13px; border-radius:50%; background:#1F4E6B; border:2px solid #fff; box-shadow:0 0 0 1px #1F4E6B; transform:translate(-50%,-50%);\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Safety : 1x ao ano -->\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <div style=\"width:170px; display:flex; align-items:center; gap:9px; font-size:14px; font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:#B5532E; flex:none;\"><\u002Fspan>Safety (MTO)<\u002Fdiv>\n          <div style=\"flex:1; position:relative; height:16px;\"><span style=\"position:absolute; left:0; right:0; top:50%; height:2px; background:#E2DED4; transform:translateY(-50%);\"><\u002Fspan><span style=\"position:absolute; left:100%; top:50%; width:13px; height:13px; border-radius:50%; background:#B5532E; border:2px solid #fff; box-shadow:0 0 0 1px #B5532E; transform:translate(-50%,-50%);\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- RFA : 1x ao ano -->\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <div style=\"width:170px; display:flex; align-items:center; gap:9px; font-size:14px; font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:#2E7D6B; flex:none;\"><\u002Fspan>RFA · Reefer seco<\u002Fdiv>\n          <div style=\"flex:1; position:relative; height:16px;\"><span style=\"position:absolute; left:0; right:0; top:50%; height:2px; background:#E2DED4; transform:translateY(-50%);\"><\u002Fspan><span style=\"position:absolute; left:33.33%; top:50%; width:13px; height:13px; border-radius:50%; background:#2E7D6B; border:2px solid #fff; box-shadow:0 0 0 1px #2E7D6B; transform:translate(-50%,-50%);\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- RFC : 1x ao ano -->\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <div style=\"width:170px; display:flex; align-items:center; gap:9px; font-size:14px; font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:#E08A2B; flex:none;\"><\u002Fspan>RFC · Reefer completo<\u002Fdiv>\n          <div style=\"flex:1; position:relative; height:16px;\"><span style=\"position:absolute; left:0; right:0; top:50%; height:2px; background:#E2DED4; transform:translateY(-50%);\"><\u002Fspan><span style=\"position:absolute; left:83.33%; top:50%; width:13px; height:13px; border-radius:50%; background:#E08A2B; border:2px solid #fff; box-shadow:0 0 0 1px #E08A2B; transform:translate(-50%,-50%);\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Corretivas : não programadas, várias ao ano -->\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <div style=\"width:170px; display:flex; align-items:center; gap:9px; font-size:14px; font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:#1B1E24; flex:none;\"><\u002Fspan>Corretivas <span style=\"font-weight:400; color:#8A8F98;\">(não prog.)<\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1; position:relative; height:16px;\"><span style=\"position:absolute; left:0; right:0; top:50%; height:2px; background:#E2DED4; transform:translateY(-50%);\"><\u002Fspan><span style=\"position:absolute; left:5%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:14%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:23%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:34%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:45%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:57%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:68%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:79%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><span style=\"position:absolute; left:91%; top:50%; width:9px; height:9px; border-radius:50%; background:#1B1E24; transform:translate(-50%,-50%);\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- axis -->\n        <div style=\"display:flex; align-items:center; gap:18px; margin-top:2px;\">\n          <div style=\"width:170px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; text-align:right;\">meses →<\u002Fdiv>\n          <div style=\"flex:1; position:relative; height:14px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98;\"><span style=\"position:absolute; left:0; transform:translateX(-50%);\">0<\u002Fspan><span style=\"position:absolute; left:25%; transform:translateX(-50%);\">3<\u002Fspan><span style=\"position:absolute; left:50%; transform:translateX(-50%);\">6<\u002Fspan><span style=\"position:absolute; left:75%; transform:translateX(-50%);\">9<\u002Fspan><span style=\"position:absolute; left:100%; transform:translateX(-50%);\">12<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:flex-start; background:#FBF1E4; border:1px solid #E6D9C2; border-radius:10px; padding:14px 16px; margin-top:20px;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B5532E\" stroke-width=\"2\" style=\"flex:none; margin-top:1px;\"><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z\"><\u002Fpath><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><\u002Fsvg>\n        <p style=\"margin:0; font-size:13.5px; line-height:1.5; color:#5A6068;\">Além dos PMs programados, as <strong style=\"color:#1B1E24;\">manutenções corretivas<\u002Fstrong> — trocar uma luz queimada, descongelar freios, consertar um pneu furado — também são <strong style=\"color:#1B1E24;\">custos internos<\u002Fstrong> e acontecem de forma <strong style=\"color:#1B1E24;\">não programada, várias vezes ao ano<\u002Fstrong>. São elas que mais variam entre carretas e pesam na previsão do custo por km.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ PROGRAMAS DE PM ============ -->\n  <div style=\"padding:54px 64px; background:#EDEAE1; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#1F4E6B; margin-bottom:10px;\">Manutenção preventiva · Programas de PM<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:30px; margin:0 0 12px; letter-spacing:-.01em;\">O que acontece em cada manutenção preventiva<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.55; margin:0 0 30px; max-width:900px;\">A frota segue quatro programas de PM com cadências distintas. Cada PM executado vira uma <span style=\"font-family:'IBM Plex Mono',monospace; font-size:15px; background:#fff; border:1px solid #DAD6CC; padding:1px 6px; border-radius:4px;\">ordem de serviço<\u002Fspan>, com custo lançado por sistema — a matéria-prima do nosso indicador de custo por km.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n\n      <!-- A-CHECK -->\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #1F4E6B; border-radius:13px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:8px;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:16px; color:#fff; background:#1F4E6B; border-radius:8px; padding:5px 12px; flex:none;\">A<\u002Fspan>\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:19px; flex:1; line-height:1.1;\">Check Trailer<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#1F4E6B; background:#E8EEF2; border-radius:30px; padding:5px 11px; flex:none;\">a cada 3 meses<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.45; color:#5A6068; margin:0 0 14px;\">Inspeção geral de entrada — estado mecânico e de segurança da carreta.<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; font-size:13px; line-height:1.4; color:#3a3d42;\">\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Chassi, cross members e landing gear<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Pneus, rodas, porcas (torque) e cubos<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Freios — lonas, ajuste e slack adjusters<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Luzes, ABS e sistema de ar (mangueiras, vazamentos)<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Portas, vedações, mud flaps e para-choque traseiro<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Anotação de defeitos para work order<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- SAFETY -->\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #B5532E; border-radius:13px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:8px;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:13px; color:#fff; background:#B5532E; border-radius:8px; padding:6px 11px; flex:none;\">SAFETY<\u002Fspan>\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:19px; flex:1; line-height:1.1;\">Inspeção de Segurança<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#B5532E; background:#F8EEE9; border-radius:30px; padding:5px 11px; flex:none;\">1× ao ano<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.45; color:#5A6068; margin:0 0 14px;\">Inspeção regulatória (MTO) — emite o certificado e o selo anual.<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; font-size:13px; line-height:1.4; color:#3a3d42;\">\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#B5532E; flex:none; margin-top:6px;\"><\u002Fspan><span>Freios completos — push rod, lonas, tambores, ABS<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#B5532E; flex:none; margin-top:6px;\"><\u002Fspan><span>Sistema de ar — válvulas, governor, leak-down<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#B5532E; flex:none; margin-top:6px;\"><\u002Fspan><span>Suspensão — molas, air bags, shocks, U-bolts<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#B5532E; flex:none; margin-top:6px;\"><\u002Fspan><span>Rodas, cubos, rolamentos e fixação<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#B5532E; flex:none; margin-top:6px;\"><\u002Fspan><span>Chassi/frame (trincas, corrosão, soldas) e coupling<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#B5532E; flex:none; margin-top:6px;\"><\u002Fspan><span>Elétrica, iluminação e fita refletiva · emissão do certificado<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- RFA -->\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #1F4E6B; border-radius:13px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:8px;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:14px; color:#fff; background:#1F4E6B; border-radius:8px; padding:6px 11px; flex:none;\">RFA<\u002Fspan>\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:19px; flex:1; line-height:1.1;\">Reefer PM · Dry Service<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#1F4E6B; background:#E8EEF2; border-radius:30px; padding:5px 11px; flex:none;\">1× ao ano<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.45; color:#5A6068; margin:0 0 14px;\">Serviço “seco” da unidade de refrigeração — sem troca de óleo/fluidos.<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; font-size:13px; line-height:1.4; color:#3a3d42;\">\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Inspeção da unidade (Thermo King / Carrier)<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Limpeza de condensador, evaporador e filtro de ar<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Correias, mangueiras e vazamentos de refrigerante<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Teste de ciclo — cooling, heating, defrost<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Alarmes/códigos, sensores de temperatura, bateria<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#1F4E6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Nível de combustível e teste do datalogger/telemetria<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- RFC -->\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #2E7D6B; border-radius:13px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:8px;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:14px; color:#fff; background:#2E7D6B; border-radius:8px; padding:6px 11px; flex:none;\">RFC<\u002Fspan>\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:19px; flex:1; line-height:1.1;\">Reefer PM · Wet Service<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#2E7D6B; background:#EFF5F2; border-radius:30px; padding:5px 11px; flex:none;\">1× ao ano<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.45; color:#5A6068; margin:0 0 14px;\">Tudo do Dry Service <strong style=\"color:#1B1E24;\">mais<\u002Fstrong> as trocas de fluidos e consumíveis.<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; font-size:13px; line-height:1.4; color:#3a3d42;\">\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#2E7D6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Troca de óleo do motor da unidade e filtro de óleo<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#2E7D6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Troca de filtro(s) de combustível e de ar<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#2E7D6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Coolant / anticongelante — nível e ajuste<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#2E7D6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Correia (substituição conforme intervalo)<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#2E7D6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Verificação de vazamentos pós-serviço<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:9px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#2E7D6B; flex:none; margin-top:6px;\"><\u002Fspan><span>Reset de horímetro/PM e registro do próximo intervalo<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ VMRS ============ -->\n  <div style=\"background:#1B1E24; color:#F3F1EA; padding:56px 64px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#E08A2B; margin-bottom:12px;\">Padrão de codificação · VMRS<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:30px; margin:0 0 14px; letter-spacing:-.01em;\">Vehicle Maintenance Reporting System<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.6; margin:0; max-width:900px; color:#B9BDC4;\">Padrão criado pelo <strong style=\"color:#F3F1EA; font-weight:600;\">TMC/ATA<\u002Fstrong> que dá uma <strong style=\"color:#F3F1EA; font-weight:600;\">linguagem universal<\u002Fstrong> para registrar manutenção: cada reparo vira um código, em vez de texto livre. É o que preenche o campo <span style=\"font-family:'IBM Plex Mono',monospace; font-size:15px; background:#2A2D34; padding:1px 6px; border-radius:4px;\">sistema_vmrs<\u002Fspan> nas linhas de mão de obra — e o que permite <strong style=\"color:#F3F1EA; font-weight:600;\">agregar o custo por sistema<\u002Fstrong> de forma comparável entre todas as carretas.<\u002Fp>\n\n    <!-- code structure + stats -->\n    <div style=\"display:grid; grid-template-columns:1.25fr 1fr; gap:18px; margin-top:34px; align-items:stretch;\">\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:14px; padding:24px 26px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#8A8F98; margin-bottom:16px;\">Anatomia do código · até 9 dígitos<\u002Fdiv>\n        <div style=\"display:flex; align-items:stretch; gap:10px;\">\n          <div style=\"flex:1.2; background:#1F4E6B; border-radius:10px; padding:14px 16px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:30px; color:#fff; letter-spacing:.04em;\">013<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9DC0D8; margin-top:6px; line-height:1.3;\">Sistema<br>Code Key 31<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:22px; color:#5A6068;\">–<\u002Fdiv>\n          <div style=\"flex:1; background:#23262D; border:1px solid #3C4049; border-radius:10px; padding:14px 16px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:30px; color:#6B6F78; letter-spacing:.04em;\">001<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6B6F78; margin-top:6px; line-height:1.3;\">Conjunto<br>Code Key 32<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:22px; color:#5A6068;\">–<\u002Fdiv>\n          <div style=\"flex:1; background:#23262D; border:1px solid #3C4049; border-radius:10px; padding:14px 16px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:30px; color:#6B6F78; letter-spacing:.04em;\">000<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6B6F78; margin-top:6px; line-height:1.3;\">Componente<br>Code Key 33<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.5; color:#8A8F98; margin:16px 0 0;\">No projeto usamos só o <strong style=\"color:#9DC0D8; font-weight:600;\">nível de sistema (3 dígitos)<\u002Fstrong> — suficiente para saber qual sistema gera o custo, sem o detalhe de conjunto e componente.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:14px; padding:24px 26px; display:flex; flex-direction:column; justify-content:center; gap:18px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px;\"><span style=\"font-family:'Archivo'; font-weight:900; font-size:42px; color:#E08A2B; line-height:1;\">10<\u002Fspan><span style=\"font-size:14.5px; color:#B9BDC4; line-height:1.4;\">grupos de alto nível<br>(cabine, chassi, motor…)<\u002Fspan><\u002Fdiv>\n        <div style=\"height:1px; background:#3C4049;\"><\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:14px;\"><span style=\"font-family:'Archivo'; font-weight:900; font-size:42px; color:#E08A2B; line-height:1;\">31<\u002Fspan><span style=\"font-size:14.5px; color:#B9BDC4; line-height:1.4;\">códigos de sistema<br>no Code Key 31<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- example system codes -->\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#8A8F98; margin:30px 0 14px;\">Exemplos de códigos de sistema (Code Key 31)<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:11px; padding:15px 16px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; color:#fff; background:#1F4E6B; border-radius:7px; padding:6px 10px; flex:none;\">001<\u002Fspan>\n        <div><div style=\"font-family:'Archivo'; font-weight:700; font-size:15px;\">Climatização / reefer<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; margin-top:2px;\">Air Conditioning, Heating &amp; Ventilating<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:11px; padding:15px 16px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; color:#1B1E24; background:#E08A2B; border-radius:7px; padding:6px 10px; flex:none;\">013<\u002Fspan>\n        <div><div style=\"font-family:'Archivo'; font-weight:700; font-size:15px;\">Freios<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; margin-top:2px;\">Brakes<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:11px; padding:15px 16px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; color:#fff; background:#6B6F78; border-radius:7px; padding:6px 10px; flex:none;\">014<\u002Fspan>\n        <div><div style=\"font-family:'Archivo'; font-weight:700; font-size:15px;\">Chassi / estrutura<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; margin-top:2px;\">Frame<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:11px; padding:15px 16px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; color:#fff; background:#B5532E; border-radius:7px; padding:6px 10px; flex:none;\">016<\u002Fspan>\n        <div><div style=\"font-family:'Archivo'; font-weight:700; font-size:15px;\">Suspensão<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; margin-top:2px;\">Suspension<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:11px; padding:15px 16px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; color:#1B1E24; background:#F3F1EA; border-radius:7px; padding:6px 10px; flex:none;\">017<\u002Fspan>\n        <div><div style=\"font-family:'Archivo'; font-weight:700; font-size:15px;\">Pneus<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; margin-top:2px;\">Tires<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#2A2D34; border:1px solid #3C4049; border-radius:11px; padding:15px 16px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; color:#fff; background:#2E7D6B; border-radius:7px; padding:6px 10px; flex:none;\">018<\u002Fspan>\n        <div><div style=\"font-family:'Archivo'; font-weight:700; font-size:15px;\">Rodas, cubos e rolamentos<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8F98; margin-top:2px;\">Wheels, Rims, Hubs &amp; Bearings<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 01 CONTEXTO ============ -->\n  <div style=\"padding:48px 64px; display:grid; grid-template-columns:120px 1fr; gap:32px; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#E08A2B;\">01<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:10px;\">Contexto<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:27px; margin:0 0 12px; letter-spacing:-.01em;\">Onde o projeto acontece<\u002Fh2>\n      <p style=\"font-size:17.5px; line-height:1.6; margin:0 0 20px; max-width:790px;\">Sobre a <strong>frota própria<\u002Fstrong> de carretas ativas, para analisar o <strong>custo de manutenção interno<\u002Fstrong> — o custo <strong>absorvido pela empresa<\u002Fstrong>, não faturado ao cliente — e <strong>prever o custo por km futuro<\u002Fstrong>.<\u002Fp>\n\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:30px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#5A6068;\">\n        <span style=\"background:#fff; border:1px solid #DAD6CC; border-radius:30px; padding:5px 12px;\">frota própria de carretas<\u002Fspan>\n        <span style=\"background:#fff; border:1px solid #DAD6CC; border-radius:30px; padding:5px 12px;\">janela 2020–2025<\u002Fspan>\n        <span style=\"background:#fff; border:1px solid #DAD6CC; border-radius:30px; padding:5px 12px;\">leitura UOM = KM<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#1F4E6B; margin-bottom:16px;\">Modelo estrela · 1 dimensão + 6 fatos<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><path d=\"M3 7h11v8H3z\"><\u002Fpath><path d=\"M14 10h4l3 3v2h-7z\"><\u002Fpath><circle cx=\"7\" cy=\"16.5\" r=\"1.8\"><\u002Fcircle><circle cx=\"17.5\" cy=\"16.5\" r=\"1.8\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#1F4E6B; border:1px solid #C7D6E0; border-radius:4px; padding:2px 6px;\">Dim<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">dim_carretas<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Atributos do ativo: montadora, ano, classe, reefer<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3.5 2\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; border:1px solid #E2DED4; border-radius:4px; padding:2px 6px;\">Fato<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">fato_readings<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Leituras de odômetro · KM acumulado por data<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><path d=\"M14.7 6.3a4 4 0 0 0-5.4 5.4l-6 6 2 2 6-6a4 4 0 0 0 5.4-5.4l-2.3 2.3-2-2 2.3-2.3Z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; border:1px solid #E2DED4; border-radius:4px; padding:2px 6px;\">Fato<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">fato_wo<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Ordens de serviço · cabeçalho + totais internos<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><circle cx=\"12\" cy=\"8\" r=\"3.2\"><\u002Fcircle><path d=\"M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; border:1px solid #E2DED4; border-radius:4px; padding:2px 6px;\">Fato<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">fato_wo_labour<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Mão de obra interna · custo e sistema VMRS<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; border:1px solid #E2DED4; border-radius:4px; padding:2px 6px;\">Fato<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">fato_wo_parts<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Peças internas · custo e flag de garantia<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><path d=\"M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z\"><\u002Fpath><path d=\"M14 3v6h6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; border:1px solid #E2DED4; border-radius:4px; padding:2px 6px;\">Fato<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">fato_contratos<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Contratos leasing/rental · franquia de KM<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:11px; padding:16px 14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\"><path d=\"M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"2.5\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; border:1px solid #E2DED4; border-radius:4px; padding:2px 6px;\">Fato<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:#1F4E6B; margin-top:12px;\">fato_gps<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5A6068; margin-top:4px; line-height:1.4;\">Telemetria bewhere · posição diária (lat/long)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 02 PERGUNTA ============ -->\n  <div style=\"padding:48px 64px; display:grid; grid-template-columns:120px 1fr; gap:32px; background:#EDEAE1; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#1F4E6B;\">02<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:14px;\">A pergunta do problema<\u002Fdiv>\n      <p style=\"font-family:'Archivo'; font-weight:600; font-size:25px; line-height:1.42; margin:0; letter-spacing:-.01em; border-left:4px solid #E08A2B; padding-left:24px; max-width:780px;\">\n        Quais são os fatores que mais influenciam o custo de manutenção interno das carretas — e como prever esse custo por km futuro com base nos dados históricos?\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ DECISÃO DE MODELAGEM: ALVO ============ -->\n  <div style=\"padding:54px 64px; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#1F4E6B; margin-bottom:10px;\">Decisão de modelagem · Definição do alvo<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:30px; margin:0 0 16px; letter-spacing:-.01em;\">Por que o alvo deixou de ser “preventiva” e passou a ser “custo interno”<\u002Fh2>\n\n    <div style=\"display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:30px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:14px; color:#8A8F98; background:#EDEAE1; border:1px solid #DAD6CC; border-radius:30px; padding:8px 16px; text-decoration:line-through;\">manutenção preventiva<\u002Fspan>\n      <svg width=\"34\" height=\"20\" viewBox=\"0 0 34 20\" fill=\"none\" stroke=\"#E08A2B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 10h28M24 4l7 6-7 6\"><\u002Fpath><\u002Fsvg>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600; color:#1B1E24; background:#fff; border:1px solid #1B1E24; border-radius:30px; padding:8px 16px;\">custo de manutenção interno<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"4.5\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"0.6\" fill=\"#1F4E6B\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n        <div><div style=\"font-family:'Archivo'; font-weight:800; font-size:16.5px;\">Foco no que a empresa paga<\u002Fdiv><p style=\"margin:5px 0 0; font-size:14px; line-height:1.5; color:#5A6068;\">O custo que pesa no resultado é o <strong style=\"color:#1B1E24;\">absorvido pela empresa<\u002Fstrong> (não faturado ao cliente) — seja a intervenção preventiva ou corretiva. “Preventiva” deixava de fora parte do gasto real.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M12 3l9 5-9 5-9-5 9-5Z\"><\u002Fpath><path d=\"M3 13l9 5 9-5\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-family:'Archivo'; font-weight:800; font-size:16.5px;\">Medem coisas diferentes<\u002Fdiv><p style=\"margin:5px 0 0; font-size:14px; line-height:1.5; color:#5A6068;\"><strong style=\"color:#1B1E24;\">Preventivo<\u002Fstrong> é o <em>tipo<\u002Fem> da manutenção; <strong style=\"color:#1B1E24;\">interno<\u002Fstrong> é <em>quem arca<\u002Fem> com o custo. Misturar os dois enviesava o alvo do modelo.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M3 5h18l-7 8v6l-4 2v-8L3 5Z\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-family:'Archivo'; font-weight:800; font-size:16.5px;\">Definição limpa e reproduzível<\u002Fdiv><p style=\"margin:5px 0 0; font-size:14px; line-height:1.5; color:#5A6068;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px;\">charge_flag = 'I'<\u002Fspan> é um filtro único e consistente. Classificar uma OS como “preventiva” é ambíguo e varia entre registros.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F4E6B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z\"><\u002Fpath><path d=\"M14 3v6h6\"><\u002Fpath><path d=\"M9 14l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-family:'Archivo'; font-weight:800; font-size:16.5px;\">Alinhado ao contrato<\u002Fdiv><p style=\"margin:5px 0 0; font-size:14px; line-height:1.5; color:#5A6068;\">Os contratos (<span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px;\">MAINT/NET/MIX<\u002Fspan>) definem o que é faturado ao cliente. O custo interno isola exatamente a <strong style=\"color:#1B1E24;\">exposição financeira da locadora<\u002Fstrong>.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 03 OBJETIVOS ============ -->\n  <div style=\"padding:48px 64px; display:grid; grid-template-columns:120px 1fr; gap:32px; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#E08A2B;\">03<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:10px;\">Objetivos<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:27px; margin:0 0 6px; letter-spacing:-.01em;\">Objetivo geral<\u002Fh2>\n      <p style=\"font-size:17.5px; line-height:1.6; margin:0 0 30px; max-width:780px;\">Analisar os dados históricos de manutenção das carretas para identificar os principais fatores que influenciam o <strong>custo interno por km<\u002Fstrong> e desenvolver um <strong>modelo preditivo<\u002Fstrong> capaz de estimar custos futuros.<\u002Fp>\n\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:16px;\">Objetivos específicos · pipeline<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <div style=\"display:flex; gap:18px; align-items:flex-start;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; align-self:stretch;\"><span style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#1F4E6B; color:#fff; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:14px;\">1<\u002Fspan><span style=\"flex:1; width:2px; background:#DAD6CC;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"padding-bottom:18px;\"><div style=\"font-weight:600; font-size:16.5px;\">Coletar, consolidar e organizar<\u002Fdiv><div style=\"font-size:14.5px; color:#5A6068;\">dados históricos de manutenção das carretas<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:flex-start;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; align-self:stretch;\"><span style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#1F4E6B; color:#fff; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:14px;\">2<\u002Fspan><span style=\"flex:1; width:2px; background:#DAD6CC;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"padding-bottom:18px;\"><div style=\"font-weight:600; font-size:16.5px;\">Análise exploratória dos dados<\u002Fdiv><div style=\"font-size:14.5px; color:#5A6068;\">identificar padrões, tendências e variáveis relevantes<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:flex-start;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; align-self:stretch;\"><span style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#1F4E6B; color:#fff; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:14px;\">3<\u002Fspan><span style=\"flex:1; width:2px; background:#DAD6CC;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"padding-bottom:18px;\"><div style=\"font-weight:600; font-size:16.5px;\">Investigar relação contratos × custos<\u002Fdiv><div style=\"font-size:14.5px; color:#5A6068;\">entre características dos contratos de leasing e os gastos<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:flex-start;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; align-self:stretch;\"><span style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#1F4E6B; color:#fff; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:14px;\">4<\u002Fspan><span style=\"flex:1; width:2px; background:#DAD6CC;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"padding-bottom:18px;\"><div style=\"font-weight:600; font-size:16.5px;\">Identificar os principais fatores<\u002Fdiv><div style=\"font-size:14.5px; color:#5A6068;\">associados aos custos de manutenção<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:flex-start;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; align-self:stretch;\"><span style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#E08A2B; color:#1B1E24; display:grid; place-items:center; font-family:'Archivo'; font-weight:800; font-size:14px;\">5<\u002Fspan><\u002Fdiv>\n          <div><div style=\"font-weight:600; font-size:16.5px;\">Desenvolver e avaliar modelos preditivos<\u002Fdiv><div style=\"font-size:14.5px; color:#5A6068;\">para estimar os custos futuros de manutenção<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 04 HIPÓTESES ============ -->\n  <div style=\"padding:48px 64px; display:grid; grid-template-columns:120px 1fr; gap:32px; background:#EDEAE1; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#1F4E6B;\">04<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:18px;\">Hipóteses<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:13px; color:#fff; background:#1B1E24; border-radius:6px; padding:4px 8px; flex:none;\">H1<\u002Fspan>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.5;\">Contratos de leasing com <strong>maior duração<\u002Fstrong> tendem a apresentar custos de manutenção mais elevados.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:13px; color:#fff; background:#1B1E24; border-radius:6px; padding:4px 8px; flex:none;\">H2<\u002Fspan>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.5;\">Carretas com <strong>maior tempo de utilização<\u002Fstrong> tendem a demandar maiores gastos com manutenção.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:13px; color:#fff; background:#1B1E24; border-radius:6px; padding:4px 8px; flex:none;\">H3<\u002Fspan>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.5;\">O aumento da <strong>quilometragem<\u002Fstrong> percorrida está associado ao aumento dos custos.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:13px; color:#fff; background:#1B1E24; border-radius:6px; padding:4px 8px; flex:none;\">H4<\u002Fspan>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.5;\">O <strong>histórico de manutenções<\u002Fstrong> anteriores é fator relevante para prever custos futuros.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start; grid-column:1 / -1;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:13px; color:#fff; background:#1B1E24; border-radius:6px; padding:4px 8px; flex:none;\">H5<\u002Fspan>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.5;\">Existem <strong>variáveis operacionais<\u002Fstrong> e características dos contratos que influenciam significativamente os custos de manutenção.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 06 BASE DE DADOS ============ -->\n  <div style=\"padding:48px 64px; display:grid; grid-template-columns:120px 1fr; gap:32px; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'Archivo'; font-weight:900; font-size:64px; line-height:.9; color:#1F4E6B;\">06<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5A6068; margin-bottom:10px;\">Base de dados completa<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:27px; margin:0 0 6px; letter-spacing:-.01em;\">As 7 tabelas-fonte e seus campos<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.55; margin:0 0 24px; max-width:800px; color:#5A6068;\">Modelo estrela: a dimensão <strong style=\"color:#1B1E24;\">dim_carretas<\u002Fstrong> e seis fatos, unidos por <strong style=\"color:#1B1E24;\">id_carreta<\u002Fstrong> — e por <strong style=\"color:#1B1E24;\">id_os<\u002Fstrong> entre OS, mão de obra e peças. {{ granularidadeLinha }}<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <!-- dim_carretas -->\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; border-left:4px solid #1F4E6B;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14.5px;\">dim_carretas<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A9488;\">dim · 1 carreta<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">\n            <span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">id_carreta<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">cod_montadora<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">ano_modelo<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">data_entrada_servico<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">eixos<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">flag_refrigerado<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">classe<\u002Fspan><span style=\"background:#F1F4F6; border-radius:5px; padding:4px 8px;\">grupo_manutencao<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- fato_readings -->\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; border-left:4px solid #6B6F78;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14.5px;\">fato_readings<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A9488;\">fato · 1 leitura<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">\n            <span style=\"background:#F2F2F3; border-radius:5px; padding:4px 8px;\">id_leitura<\u002Fspan><span style=\"background:#F2F2F3; border-radius:5p ont-size:12px;\">\n            <span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">id_linha_peca<\u002Fspan><span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">id_peca<\u002Fspan><span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">descricao_peca<\u002Fspan><span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">qtd_real<\u002Fspan><span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">custo_item<\u002Fspan><span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">custo_interno_peca<\u002Fspan><span style=\"background:#F8EEE9; border-radius:5px; padding:4px 8px;\">flag_garantia<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- fato_contratos -->\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; border-left:4px solid #1B1E24;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14.5px;\">fato_contratos<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A9488;\">fato · 1 carreta-contrato<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">\n            <span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">id_contrato_carreta<\u002Fspan><span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">tipo_contrato<\u002Fspan><span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">tipo_manutencao<\u002Fspan><span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">id_cliente<\u002Fspan><span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">data_inicio<\u002Fspan><span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">data_fim<\u002Fspan><span style=\"background:#EFEFF1; border-radius:5px; padding:4px 8px;\">franquia_km_mensal<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- fato_gps -->\n        <div style=\"background:#fff; border:1px solid #DAD6CC; border-radius:12px; padding:16px 18px; border-left:4px solid #3F7E8C; grid-column:1 / -1;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14.5px;\">fato_gps<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A9488;\">fato · 1 ponto/dia · telemetria bewhere<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">\n            <span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">id_carreta<\u002Fspan><span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">id_beacon<\u002Fspan><span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">data_hora_gps<\u002Fspan><span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">latitude<\u002Fspan><span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">longitude<\u002Fspan><span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">velocidade<\u002Fspan><span style=\"background:#ECF2F3; border-radius:5px; padding:4px 8px;\">endereco<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:14px; background:#1B1E24; color:#F3F1EA; border-radius:12px; padding:16px 20px; margin-top:14px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#E08A2B; flex:none;\">Variável-alvo<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px;\">custo_interno_de_manutencao_por_km<\u002Fspan>\n        <span style=\"font-size:13.5px; color:#B9BDC4; margin-left:auto;\">custo interno (não faturado ao cliente) ÷ km rodado<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:16px; align-items:flex-start; background:#fff; border:1px solid #DAD6CC; border-left:4px solid #E08A2B; border-radius:12px; padding:18px 20px; margin-top:14px;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E08A2B\" stroke-width=\"1.9\" style=\"flex:none;\"><path d=\"M4 19l5-5 4 3 7-8\"><\u002Fpath><path d=\"M16 6h5v5\"><\u002Fpath><\u002Fsvg>\n        <div>\n          <div style=\"font-family:'Archivo'; font-weight:800; font-size:16px; margin-bottom:5px;\">Ajuste pela inflação<\u002Fdiv>\n          <p style=\"margin:0; font-size:14.5px; line-height:1.5; color:#5A6068;\">Os custos históricos serão <strong style=\"color:#1B1E24;\">deflacionados a valor presente<\u002Fstrong> (R$ reais, via IPCA / índice setorial) antes da modelagem, para isolar os fatores reais de custo. A previsão poderá ser reexpressa em <strong style=\"color:#1B1E24;\">valor futuro<\u002Fstrong> (nominal) para fins de orçamento e contratos.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ NORMALIZADO x DESNORMALIZADO ============ -->\n  <div style=\"padding:54px 64px; background:#EDEAE1; border-bottom:1px solid #DAD6CC;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#1F4E6B; margin-bottom:10px;\">Modelagem de dados · Conceito<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-weight:800; font-size:30px; margin:0 0 12px; letter-spacing:-.01em;\">Dados normalizados × desnormalizados<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.55; margin:0 0 30px; max-width:880px;\">Os mesmos dados podem assumir duas formas. <strong>Normalizado<\u002Fstrong>: dividido em várias tabelas relacionadas, sem repetição — o formato da nossa extração. <strong>Desnormalizado<\u002Fstrong>: achatado numa única tabela larga, com tudo junto e redundância aceita — o formato que a análise e o modelo consomem.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start;\">\n\n      <!-- ===== NORMALIZADO ===== -->\n      <div style=\"background:#fff; border:1px solid #DAD6CC; border-top:4px solid #1F4E6B; border-radius:13px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n          <span style=\"font-family:'Archivo'; font-weight:800; font-size:12px; letter-spacing:.04em; color:#fff; background:#1F4E6B; border-radius:6px; padding:5px 10px;\">NORMALIZADO<\u002Fspan>\n          <span style=\"font-size:13px; color:#5A6068;\">várias tabelas · ligadas por chave<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14px; line-height:1.5; color:#5A6068; margin:8px 0 16px;\">Cada tabela no seu grão. A montadora da carreta fica guardada <strong style=\"color:#1B1E24;\">uma única vez<\u002Fstrong> em <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px;\">dim_carretas<\u002Fspan> e é referenciada por <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px;\">id_carreta<\u002Fspan>.<\u002Fp>\n\n        <div style=\"border:1px solid #DAD6CC; border-radius:8px; overflow:hidden; margin-bottom:10px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#1F4E6B; background:#E8EEF2; padding:6px 10px;\">dim_carretas<\u002Fdiv>\n          <table style=\"width:100%; border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:11px;\">\n            <tbody><tr style=\"color:#8A8F98;\"><td style=\"padding:5px 10px;\">id_carreta<\u002Ftd><td style=\"padding:5px 10px;\
